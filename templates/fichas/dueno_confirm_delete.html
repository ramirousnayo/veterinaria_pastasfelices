{% extends 'fichas/base.html' %}

{% block title %}Eliminar Dueño{% endblock %}

{% block content %}
<h1>Eliminar Dueño</h1>

<div class="card">
    <p>¿Estás seguro de que deseas eliminar al dueño <strong>{{ object.nombre }}</strong>?</p>
    <p class="empty" style="margin-top: 0.5rem;">Esta acción también eliminará todas sus mascotas y consultas médicas.
    </p>

    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="btn btn-danger">Confirmar eliminación</button>
            <a href="{% url 'fichas:dueno_lista' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
