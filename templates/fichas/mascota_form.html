{% extends 'fichas/base.html' %}

{% block title %}{% if object %}Editar Mascota{% else %}Nueva Mascota{% endif %}{% endblock %}

{% block content %}
<h1>{% if object %}Editar Mascota{% else %}Nueva Mascota{% endif %}</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'fichas:mascota_lista' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
