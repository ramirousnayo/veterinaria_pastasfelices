<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Patas Felices{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
        }

        nav {
            background: #2c7a7b;
            padding: 1rem 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        nav .brand {
            font-size: 1.2rem;
            font-weight: 700;
            margin-right: auto;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #2c7a7b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        th {
            background: #2c7a7b;
            color: white;
            padding: 0.75rem 1rem;
            text-align: left;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f7fafc;
        }

        .btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #2c7a7b;
            color: white;
        }

        .btn-warning {
            background: #d97706;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-secondary {
            background: #718096;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        form p {
            margin-bottom: 1rem;
        }

        form input,
        form textarea,
        form select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            font-size: 0.95rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 1rem;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .empty {
            color: #718096;
            font-style: italic;
        }
    </style>
</head>

<body>
    <nav>
        <span class="brand">🐾 Patas Felices</span>
        <a href="{% url 'fichas:dueno_lista' %}">Dueños</a>
        <a href="{% url 'fichas:dueno_crear' %}">+ Dueño</a>
        <a href="{% url 'fichas:mascota_lista' %}">Mascotas</a>
        <a href="{% url 'fichas:mascota_crear' %}">+ Mascota</a>
        <a href="{% url 'fichas:consulta_lista' %}">Consultas</a>
        <a href="{% url 'fichas:consulta_crear' %}">+ Consulta</a>
    </nav>
    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div
            style="background: #c6f6d5; border: 1px solid #68d391; color: #276749; padding: 0.75rem 1rem; border-radius: 5px; margin-bottom: 1rem;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>

</html>
